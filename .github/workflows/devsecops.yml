name: DevSecOps Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: "2.3.3"
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache .venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-py3.12-

      - name: Install dependencies
        run: poetry install --with dev --no-interaction

      - name: "[SAST] Bandit - Static Analysis"
        run: poetry run bandit -r . --exclude ./.venv,./tests -ll

      - name: "[Lint] Ruff - Code Quality"
        run: poetry run ruff check .

      - name: "[SCA] Safety - Dependency CVE Check"
        run: poetry run safety check
